name: Deploy Admin

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/carlosasjr/softproceramica-admin

permissions:
  contents: read
  packages: write

jobs:
  # AUD-003 (ADR-028): guardrails obrigatórios ANTES de qualquer build/deploy. Se qualquer comando
  # falhar, o job falha e o `build` (que depende dele) não roda — sem continue-on-error, sem `|| true`.
  # `test:tokens` NÃO se aplica ao admin: aquele guard é o resolveOrigin/T-FS-2 da Timeline, que só
  # existe no `app` (o admin espelha o Control Plane e não tem Timeline nem tokens de origem).
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck (vue-tsc)
        run: npm run typecheck

      - name: Guardrail enums (G-2 · paridade backend↔admin)
        run: npm run test:enums

  build:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sem build-args: o console auto-deriva a base da API do próprio host
      # (https://admin.conectaceramica.com.br/api → /api/platform/*). ADR-024.
      - name: Build & push Admin (SPA)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/conecta
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull admin
            docker compose -f docker-compose.prod.yml up -d admin
            docker image prune -f
